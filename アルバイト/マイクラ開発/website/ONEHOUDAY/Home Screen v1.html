<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ONEHOUDAY — ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --grass-top:#7cc34a;--grass-side:#6aab3e;--dirt:#8b5a3b;--dirt-dark:#6b4229;
    --stone:#9a9a9a;--stone-dark:#6f6f6f;--cobble:#7f7f7f;
    --diamond:#5ce9e6;--diamond-dark:#2a9faa;
    --gold:#fbd24a;--gold-dark:#c99a1f;
    --redstone:#d93b2a;--redstone-dark:#9a2a1d;
    --sky:#87ceeb;--sky-2:#b6e3f5;
    --wood:#b2855a;--wood-dark:#6d4d2e;
    --emerald:#37c872;--amethyst:#b588ff;--obsidian:#3a2e55;
    --ink:#1a1a1a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"DotGothic16","Hiragino Kaku Gothic Pro",sans-serif;
    background:#1a1a1a;color:var(--ink);
    image-rendering:pixelated;
    overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer;}

  /* ========= TOP BAR ========= */
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:10px 18px;
    background:#2a2a2a;
    border-bottom:4px solid #111;
    box-shadow:0 4px 0 #00000033;
    color:#fff;
    height:56px;
  }
  .home-btn{
    font-size:14px;color:#fff;
    padding:8px 14px;border:3px solid #111;background:var(--stone);
    box-shadow:inset -2px -2px 0 #00000066,inset 2px 2px 0 #ffffff22;
    text-shadow:2px 2px 0 #00000099;
  }
  .breadcrumb{flex:1;font-size:14px;color:#fff;}
  .breadcrumb b{color:#ffd76b;}
  .rank-badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 14px;background:#111;color:#ffd76b;
    border:3px solid #000;font-family:"Press Start 2P",monospace;font-size:11px;
    box-shadow:inset -2px -2px 0 #00000088,inset 2px 2px 0 #ffffff22;
  }
  .rank-badge .rb-name{color:#fff;font-family:"DotGothic16";font-size:14px;}
  .rank-badge .rb-p{color:#b6ff6e;}

  /* ========= APP LAYOUT ========= */
  .app{
    display:grid;
    grid-template-columns:260px 1fr;
    height:calc(100vh - 56px);
    min-height:0;
  }

  /* ========= SIDEBAR ========= */
  .sidebar{
    background:repeating-linear-gradient(90deg,#7f7f7f 0 8px,#6f6f6f 8px 16px);
    border-right:5px solid #111;
    padding:18px 14px;
    display:flex;flex-direction:column;gap:10px;
    box-shadow:inset -4px 0 0 #00000077,inset 4px 0 0 #ffffff22;
    overflow-y:auto;
  }
  .sidebar-logo{padding:6px 0 10px;display:flex;justify-content:center;}
  .nav-btn{
    display:flex;align-items:center;gap:10px;
    padding:14px 12px;border:3px solid #111;background:#444;color:#fff;
    box-shadow:inset -3px -3px 0 #00000066,inset 3px 3px 0 #ffffff22;
    text-shadow:2px 2px 0 #00000099;
    text-align:left;font-size:15px;
    transition:transform .08s;
  }
  .nav-btn:hover{transform:translateY(-2px);}
  .nav-btn:active{transform:translateY(2px);box-shadow:inset -2px -2px 0 #00000066,inset 2px 2px 0 #ffffff22;}
  .nav-btn .ico{font-size:24px;}
  .nav-btn.active{background:var(--diamond);color:#08323a;text-shadow:1px 1px 0 #ffffff88;}
  .nav-btn .label{flex:1;}
  .nav-btn .badge{
    font-family:"Press Start 2P",monospace;font-size:9px;
    background:#111;color:#ffd76b;padding:3px 6px;border:2px solid #000;
  }
  .nav-btn.active .badge{background:#08323a;color:#5ce9e6;}

  .player{
    margin-top:auto;background:#111;border:3px solid #000;padding:12px;
    color:#fff;box-shadow:inset -2px -2px 0 #00000088;
  }
  .player-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{
    width:42px;height:42px;background:var(--grass-top);border:3px solid #000;
    display:flex;align-items:center;justify-content:center;font-size:24px;
    box-shadow:inset -2px -2px 0 #00000077,inset 2px 2px 0 #ffffff44;
  }
  .player-name{font-size:15px;}
  .player-rank{font-family:"Press Start 2P";font-size:9px;color:#ffd76b;margin-top:2px;}
  .xpbar{
    height:12px;background:#000;border:2px solid #000;position:relative;overflow:hidden;
  }
  .xpbar .fill{height:100%;background:var(--diamond);
    box-shadow:inset 0 -3px 0 #00000033,inset 0 3px 0 #ffffff44;}
  .xptxt{font-family:"Press Start 2P";font-size:9px;color:#b6ff6e;margin-top:6px;text-align:center;}

  /* ========= CONTENT ========= */
  .content{
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky-2) 75%,#d8ecd4 100%);
    padding:22px 32px 28px;
    overflow-y:auto;
    position:relative;
    display:flex;flex-direction:column;gap:18px;
  }
  /* clouds */
  .content::before{
    content:"";position:absolute;top:30px;left:8%;width:80px;height:16px;background:#fff;
    box-shadow:
      -16px -8px 0 0 #fff,16px -8px 0 0 #fff,32px 0 0 0 #fff,-32px 0 0 0 #fff,
      0 -16px 0 0 #fff,16px -16px 0 0 #fff,
      400px 80px 0 0 #fff, 416px 72px 0 0 #fff, 432px 80px 0 0 #fff, 384px 80px 0 0 #fff,
      720px 30px 0 0 #fff, 736px 22px 0 0 #fff, 752px 30px 0 0 #fff, 704px 30px 0 0 #fff;
    opacity:.85;pointer-events:none;
  }
  /* ground strip */
  .content::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:64px;
    background:
      repeating-linear-gradient(90deg,var(--grass-top) 0 16px,var(--grass-side) 16px 18px) top/100% 14px no-repeat,
      repeating-linear-gradient(90deg,var(--dirt) 0 16px,var(--dirt-dark) 16px 18px);
    border-top:4px solid #3d6b21;
    pointer-events:none;
  }

  .ttl-row{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    position:relative;z-index:2;flex-wrap:wrap;
  }
  .v-title{
    font-family:"DotGothic16";font-size:30px;color:#fff;
    text-shadow:3px 3px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;
    margin:0;
  }
  .greet{
    font-size:13px;color:#fff;text-shadow:2px 2px 0 #000;
    margin-top:2px;
  }
  .streak{
    background:var(--redstone);color:#fff;padding:8px 14px;
    border:3px solid #000;font-size:14px;
    box-shadow:inset -2px -2px 0 #00000055,inset 2px 2px 0 #ffffff33,0 4px 0 #00000055;
    text-shadow:2px 2px 0 #00000088;
    display:inline-flex;align-items:center;gap:6px;
  }

  /* ========= QUEST GRID ========= */
  .quest-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
    position:relative;z-index:2;
  }
  .quest{
    background:#fff;border:4px solid #111;padding:16px;
    box-shadow:inset -3px -3px 0 #00000022,inset 3px 3px 0 #ffffff88,0 6px 0 #00000055;
    color:#111;display:flex;flex-direction:column;gap:10px;
    position:relative;cursor:pointer;
    transition:transform .1s;
  }
  .quest:hover{transform:translateY(-3px);}
  .quest:active{transform:translateY(3px);box-shadow:inset -3px -3px 0 #00000022,inset 3px 3px 0 #ffffff88,0 2px 0 #00000055;}
  .quest h3{font-family:"DotGothic16";font-size:22px;margin:0;}
  .qsub{font-size:13px;color:#444;}
  .qbar{height:10px;background:#ddd;border:2px solid #111;}
  .qbar .fill{height:100%;
    box-shadow:inset 0 -2px 0 #00000033,inset 0 2px 0 #ffffff66;}
  .qmeta{display:flex;justify-content:space-between;font-family:"Press Start 2P";font-size:10px;color:#666;}
  .qhead{display:flex;align-items:center;gap:12px;}
  .icon-tile{
    width:52px;height:52px;border:3px solid #111;display:flex;align-items:center;justify-content:center;
    font-size:30px;box-shadow:inset -2px -2px 0 #00000055,inset 2px 2px 0 #ffffff44;
    filter:drop-shadow(2px 2px 0 #00000066);flex-shrink:0;
  }
  .quest.qmath .icon-tile{background:linear-gradient(135deg,#7cc34a,#6aab3e);}
  .quest.qprog .icon-tile{background:linear-gradient(135deg,#5ce9e6,#2a9faa);}
  .quest.qtype .icon-tile{background:linear-gradient(135deg,#b588ff,#8b5cd9);}
  .qbar.qmath .fill{background:var(--grass-top);}
  .qbar.qprog .fill{background:var(--diamond);}
  .qbar.qtype .fill{background:var(--amethyst);}

  .quest .play-cta{
    margin-top:auto;display:flex;align-items:center;justify-content:space-between;
    padding-top:6px;
  }
  .play-btn{
    font-family:"Press Start 2P";font-size:11px;
    padding:8px 12px;border:3px solid #111;
    box-shadow:inset -2px -2px 0 #00000055,inset 2px 2px 0 #ffffff66,0 3px 0 #00000055;
  }
  .quest.qmath .play-btn{background:var(--grass-top);color:#1a3a0b;text-shadow:1px 1px 0 #ffffff66;}
  .quest.qprog .play-btn{background:var(--diamond);color:#08323a;text-shadow:1px 1px 0 #ffffff66;}
  .quest.qtype .play-btn{background:var(--amethyst);color:#3a1a5e;text-shadow:1px 1px 0 #ffffff66;}
  .pts-tag{
    font-family:"Press Start 2P";font-size:10px;color:#666;
  }
  .new-flag{
    position:absolute;top:-10px;right:-10px;
    background:var(--redstone);color:#fff;font-family:"Press Start 2P";font-size:10px;
    padding:5px 8px;border:3px solid #000;transform:rotate(8deg);
    box-shadow:0 3px 0 #00000077;text-shadow:1px 1px 0 #00000099;
  }

  /* ========= ACHIEVEMENTS ========= */
  .achievements{
    background:rgba(255,255,255,.85);border:3px dashed #111;padding:14px 18px;
    color:#111;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    position:relative;z-index:2;
  }
  .ach-icon{font-size:32px;}
  .ach-label{
    font-family:"Press Start 2P";font-size:10px;color:#666;
    margin-bottom:6px;letter-spacing:.05em;
  }
  .ach-row{display:flex;gap:8px;flex-wrap:wrap;}
  .medal{
    padding:5px 12px;background:#cd7f32;color:#fff;border:2px solid #000;
    font-family:"Press Start 2P";font-size:10px;
    box-shadow:inset -2px -2px 0 #00000044,inset 2px 2px 0 #ffffff44;
  }
  .medal.silver{background:#c0c0c0;color:#222;text-shadow:1px 1px 0 #ffffff66;}
  .medal.gold{background:var(--gold);color:#3a2a00;text-shadow:1px 1px 0 #ffffff66;}
  .medal.locked{background:#333;color:#666;}

  /* ========= ONEHOUDAY LOGO ========= */
  .tl{
    display:inline-flex;flex-wrap:nowrap;justify-content:center;align-items:center;gap:5px;
    font-family:"Press Start 2P",monospace;white-space:nowrap;
  }
  .tl-block{
    display:inline-flex;align-items:center;justify-content:center;
    width:24px;height:24px;font-size:13px;color:#fff;
    text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;
    border:2px solid #111;flex-shrink:0;
    box-shadow:inset -2px -2px 0 #00000066,inset 2px 2px 0 #ffffff55,0 2px 0 #00000066;
  }
  .tl-g{background:var(--grass-top);}
  .tl-y{background:var(--gold);color:#3a2a00;text-shadow:1px 1px 0 #ffffff88;}
  .tl-r{background:var(--redstone);}
  .tl-d{background:var(--diamond);color:#08323a;text-shadow:1px 1px 0 #ffffff88;}
  .tl-p{background:#b588ff;}
  .tl-s{background:var(--stone);}
  .tl-e{background:#37c872;}
  .tl-o{background:#ff8a3a;}
  .tl-w{background:#fff;color:#111;text-shadow:1px 1px 0 #ffffff88;}

  /* ========= RESPONSIVE ========= */
  @media (max-width: 1100px){
    .quest-grid{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width: 900px){
    .app{grid-template-columns:200px 1fr;}
    .sidebar{padding:12px 8px;}
    .nav-btn{font-size:13px;padding:10px 8px;}
    .nav-btn .ico{font-size:20px;}
  }
  @media (max-width: 720px){
    .quest-grid{grid-template-columns:1fr;}
    .v-title{font-size:24px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="home-btn">🏠 ホーム</button>
  <div class="breadcrumb"><b>ホーム</b> ／ きょうの ぼうけん</div>
  <div class="rank-badge">
    <span>🪨</span>
    <span class="rb-name">石</span>
    <span>1,850</span>
    <span class="rb-p">P</span>
  </div>
</div>

<div class="app">
  <!-- ========= SIDEBAR ========= -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="tl" aria-label="ONEHOUDAY">
        <span class="tl-block tl-g">O</span><span class="tl-block tl-y">N</span><span class="tl-block tl-r">E</span><span class="tl-block tl-d">H</span><span class="tl-block tl-p">O</span><span class="tl-block tl-s">U</span><span class="tl-block tl-e">D</span><span class="tl-block tl-o">A</span><span class="tl-block tl-w">Y</span>
      </div>
    </div>
    <button class="nav-btn active">
      <span class="ico">🏠</span><span class="label">ホーム</span>
    </button>
    <button class="nav-btn">
      <span class="ico">🧮</span><span class="label">さんすう</span>
      <span class="badge">7/12</span>
    </button>
    <button class="nav-btn">
      <span class="ico">🤖</span><span class="label">プログラミング</span>
      <span class="badge">3/5</span>
    </button>
    <button class="nav-btn">
      <span class="ico">⌨</span><span class="label">タイピング</span>
      <span class="badge">NEW</span>
    </button>
    <button class="nav-btn">
      <span class="ico">🏆</span><span class="label">じっせき</span>
    </button>

    <div class="player">
      <div class="player-row">
        <div class="avatar">⛏</div>
        <div>
          <div class="player-name">RANK · 石</div>
          <div class="player-rank">つぎは 鉄 まで</div>
        </div>
      </div>
      <div class="xpbar"><div class="fill" style="width:62%"></div></div>
      <div class="xptxt">1,850 / 2,000 P</div>
    </div>
  </aside>

  <!-- ========= CONTENT ========= -->
  <main class="content">
    <div class="ttl-row">
      <div>
        <div class="greet">🌳 きょうも ぼうけん スタート！</div>
        <h1 class="v-title">きょうの ぼうけんは？</h1>
      </div>
      <div class="streak">🔥 5日 れんぞく プレイ！</div>
    </div>

    <div class="quest-grid">
      <button class="quest qmath">
        <div class="qhead">
          <div class="icon-tile">🧮</div>
          <div>
            <h3>さんすう</h3>
            <div class="qsub">九九 5の段 まで クリア</div>
          </div>
        </div>
        <div class="qbar qmath"><div class="fill" style="width:58%"></div></div>
        <div class="qmeta"><span>7 / 12 STAGE</span><span>★ 6,400P</span></div>
        <div class="play-cta">
          <span class="pts-tag">ベスト 1,950P</span>
          <span class="play-btn">▶ つづける</span>
        </div>
      </button>

      <button class="quest qprog">
        <div class="qhead">
          <div class="icon-tile">🤖</div>
          <div>
            <h3>プログラミング</h3>
            <div class="qsub">つぎ：ジグザグ ミッション</div>
          </div>
        </div>
        <div class="qbar qprog"><div class="fill" style="width:60%"></div></div>
        <div class="qmeta"><span>3 / 5 MISSION</span><span>★ 2,400P</span></div>
        <div class="play-cta">
          <span class="pts-tag">ロボットを うごかそう</span>
          <span class="play-btn">▶ つづける</span>
        </div>
      </button>

      <button class="quest qtype">
        <div class="new-flag">NEW!</div>
        <div class="qhead">
          <div class="icon-tile">⌨</div>
          <div>
            <h3>タイピング</h3>
            <div class="qsub">君が代 はじめて 挑戦！</div>
          </div>
        </div>
        <div class="qbar qtype"><div class="fill" style="width:15%"></div></div>
        <div class="qmeta"><span>NEW</span><span>★ 0P</span></div>
        <div class="play-cta">
          <span class="pts-tag">キーボードで バトル</span>
          <span class="play-btn">▶ はじめる</span>
        </div>
      </button>
    </div>

    <div class="achievements">
      <span class="ach-icon">🏆</span>
      <div style="flex:1;min-width:200px;">
        <div class="ach-label">さいきんの じっせき</div>
        <div class="ach-row">
          <span class="medal gold">九九 1の段 PERFECT</span>
          <span class="medal silver">ミッション 3 クリア</span>
          <span class="medal">れんぞく 5日</span>
          <span class="medal locked">？？？</span>
          <span class="medal locked">？？？</span>
        </div>
      </div>
    </div>
  </main>
</div>

</body>
</html>
