<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ONEHOUDAY — ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --grass-top:#7cc34a;--grass-side:#6aab3e;--dirt:#8b5a3b;--dirt-dark:#6b4229;
    --stone:#9a9a9a;--stone-dark:#6f6f6f;
    --diamond:#5ce9e6;--diamond-dark:#2a9faa;
    --gold:#fbd24a;--gold-dark:#c99a1f;
    --redstone:#d93b2a;--redstone-dark:#9a2a1d;
    --sky:#87ceeb;--sky-2:#b6e3f5;
    --wood:#b2855a;--wood-dark:#6d4d2e;
    --emerald:#37c872;--amethyst:#b588ff;--obsidian:#3a2e55;
    --ink:#1a1a1a;
  }
  /* night mode */
  body[data-mode="night"]{
    --sky:#1d2d5c;--sky-2:#2a3d75;--grass-top:#3a6a2a;--grass-side:#2d5320;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"DotGothic16","Hiragino Kaku Gothic Pro",sans-serif;
    background:#1a1a1a;color:var(--ink);
    image-rendering:pixelated;
    overflow:hidden;
  }
  button{font-family:inherit;cursor:pointer;}

  /* ========= TOP BAR ========= */
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:10px 18px;background:#2a2a2a;
    border-bottom:4px solid #111;box-shadow:0 4px 0 #00000033;
    color:#fff;height:56px;position:relative;z-index:5;
  }
  .home-btn{
    font-size:14px;color:#fff;
    padding:8px 14px;border:3px solid #111;background:var(--stone);
    box-shadow:inset -2px -2px 0 #00000066,inset 2px 2px 0 #ffffff22;
    text-shadow:2px 2px 0 #00000099;
  }
  .breadcrumb{flex:1;font-size:14px;color:#fff;}
  .breadcrumb b{color:#ffd76b;}
  .topbar-actions{display:flex;align-items:center;gap:10px;}
  .icon-btn{
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    border:3px solid #111;background:#444;color:#fff;font-size:18px;
    box-shadow:inset -2px -2px 0 #00000066,inset 2px 2px 0 #ffffff22;
    text-shadow:1px 1px 0 #00000099;position:relative;
  }
  .icon-btn .dot{
    position:absolute;top:-4px;right:-4px;
    width:14px;height:14px;background:var(--redstone);
    border:2px solid #000;border-radius:50%;
    font-family:"Press Start 2P";font-size:7px;color:#fff;
    display:flex;align-items:center;justify-content:center;line-height:1;
  }
  .rank-badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 14px;background:#111;color:#ffd76b;
    border:3px solid #000;font-family:"Press Start 2P",monospace;font-size:11px;
    box-shadow:inset -2px -2px 0 #00000088,inset 2px 2px 0 #ffffff22;
  }
  .rank-badge .rb-name{color:#fff;font-family:"DotGothic16";font-size:14px;}
  .rank-badge .rb-p{color:#b6ff6e;}

  /* ========= APP LAYOUT ========= */
  .app{
    display:grid;grid-template-columns:260px 1fr;
    height:calc(100vh - 56px);min-height:0;
  }

  /* ========= SIDEBAR ========= */
  .sidebar{
    background:repeating-linear-gradient(90deg,#7f7f7f 0 8px,#6f6f6f 8px 16px);
    border-right:5px solid #111;padding:18px 14px;
    display:flex;flex-direction:column;gap:10px;
    box-shadow:inset -4px 0 0 #00000077,inset 4px 0 0 #ffffff22;
    overflow-y:auto;
  }
  .sidebar-logo{padding:6px 0 10px;display:flex;justify-content:center;}
  .nav-btn{
    display:flex;align-items:center;gap:10px;
    padding:14px 12px;border:3px solid #111;background:#444;color:#fff;
    box-shadow:inset -3px -3px 0 #00000066,inset 3px 3px 0 #ffffff22;
    text-shadow:2px 2px 0 #00000099;text-align:left;font-size:15px;
    transition:transform .08s;
  }
  .nav-btn:hover{transform:translateY(-2px);}
  .nav-btn:active{transform:translateY(2px);}
  .nav-btn .ico{font-size:24px;}
  .nav-btn.active{background:var(--diamond);color:#08323a;text-shadow:1px 1px 0 #ffffff88;}
  .nav-btn .label{flex:1;}
  .nav-btn .badge{
    font-family:"Press Start 2P",monospace;font-size:9px;
    background:#111;color:#ffd76b;padding:3px 6px;border:2px solid #000;
  }
  .nav-btn.active .badge{background:#08323a;color:#5ce9e6;}

  .player{
    margin-top:auto;background:#111;border:3px solid #000;padding:12px;
    color:#fff;box-shadow:inset -2px -2px 0 #00000088;
  }
  .player-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{
    width:42px;height:42px;background:var(--grass-top);border:3px solid #000;
    display:flex;align-items:center;justify-content:center;font-size:24px;
    box-shadow:inset -2px -2px 0 #00000077,inset 2px 2px 0 #ffffff44;
  }
  .player-name{font-size:14px;}
  .player-rank{font-family:"Press Start 2P";font-size:9px;color:#ffd76b;margin-top:2px;}
  .xpbar{height:12px;background:#000;border:2px solid #000;position:relative;overflow:hidden;}
  .xpbar .fill{
    height:100%;background:var(--diamond);
    box-shadow:inset 0 -3px 0 #00000033,inset 0 3px 0 #ffffff44;
    transition:width 1s cubic-bezier(.4,1.6,.6,1);
  }
  .xptxt{font-family:"Press Start 2P";font-size:9px;color:#b6ff6e;margin-top:6px;text-align:center;}

  /* ========= CONTENT ========= */
  .content{
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky-2) 75%,#d8ecd4 100%);
    padding:20px 28px 110px;overflow-y:auto;
    position:relative;display:flex;flex-direction:column;gap:18px;
  }
  .content > *{flex-shrink:0;}
  body[data-mode="night"] .content{
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky-2) 75%,#1a3a1a 100%);
  }

  /* ========= PARALLAX SKY ========= */
  .sky-layer{position:absolute;left:0;right:0;pointer-events:none;}
  .clouds{top:20px;height:180px;z-index:0;overflow:hidden;}
  .cloud{
    position:absolute;background:#fff;opacity:.85;
    width:64px;height:14px;
    box-shadow:
      -14px -7px 0 0 #fff,14px -7px 0 0 #fff,
      28px 0 0 0 #fff,-28px 0 0 0 #fff,
      0 -14px 0 0 #fff,14px -14px 0 0 #fff;
    animation:cloudDrift linear infinite;
  }
  body[data-mode="night"] .cloud{opacity:.35;}
  @keyframes cloudDrift{
    from{transform:translateX(-120px);}
    to{transform:translateX(calc(100vw + 120px));}
  }
  .moon,.sun{
    position:absolute;top:18px;right:48px;width:48px;height:48px;
    background:var(--gold);
    box-shadow:0 0 0 5px var(--gold-dark),0 0 36px 10px rgba(251,210,74,.45);
    z-index:0;
  }
  body[data-mode="night"] .sun{display:none;}
  body[data-mode="day"] .moon{display:none;}
  .moon{
    background:#e8e8f0;box-shadow:0 0 0 4px #b8b8d0,0 0 36px 10px rgba(232,232,240,.4);
  }
  .moon::before,.moon::after{
    content:"";position:absolute;background:#b8b8d0;
  }
  .moon::before{width:10px;height:10px;top:8px;left:10px;}
  .moon::after{width:8px;height:8px;bottom:10px;right:8px;}
  .stars{display:none;}
  body[data-mode="night"] .stars{
    display:block;position:absolute;inset:0;z-index:0;
    background-image:
      radial-gradient(2px 2px at 12% 18%,#fff,transparent),
      radial-gradient(1.5px 1.5px at 28% 8%,#fff,transparent),
      radial-gradient(2px 2px at 44% 24%,#fff,transparent),
      radial-gradient(1px 1px at 58% 12%,#fff,transparent),
      radial-gradient(2px 2px at 72% 28%,#fff,transparent),
      radial-gradient(1.5px 1.5px at 84% 14%,#fff,transparent),
      radial-gradient(1px 1px at 16% 36%,#fff,transparent),
      radial-gradient(2px 2px at 92% 32%,#fff,transparent);
    animation:twinkle 3s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes twinkle{from{opacity:.5;}to{opacity:1;}}

  /* ground strip */
  .ground{
    position:absolute;left:0;right:0;bottom:0;height:64px;z-index:0;
    pointer-events:none;
  }
  .ground .grass{
    height:14px;
    background:repeating-linear-gradient(90deg,var(--grass-top) 0 16px,var(--grass-side) 16px 18px);
    border-top:4px solid #3d6b21;
  }
  .ground .dirt{
    height:50px;
    background:repeating-linear-gradient(90deg,var(--dirt) 0 16px,var(--dirt-dark) 16px 18px);
  }

  /* ========= HEADER ROW ========= */
  .ttl-row{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    position:relative;z-index:2;flex-wrap:wrap;
  }
  .v-title{
    font-family:"DotGothic16";font-size:30px;color:#fff;
    text-shadow:3px 3px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;
    margin:0;
  }
  .greet{
    font-size:13px;color:#fff;text-shadow:2px 2px 0 #000;margin-top:2px;
  }
  .header-pills{display:flex;gap:10px;flex-wrap:wrap;}
  .streak,.daily-pill{
    color:#fff;padding:8px 14px;border:3px solid #000;font-size:13px;
    box-shadow:inset -2px -2px 0 #00000055,inset 2px 2px 0 #ffffff33,0 4px 0 #00000055;
    text-shadow:2px 2px 0 #00000088;display:inline-flex;align-items:center;gap:6px;
  }
  .streak{background:var(--redstone);}
  .daily-pill{background:var(--gold);color:#3a2a00;text-shadow:1px 1px 0 #ffffff88;}

  /* ========= DAILY CHALLENGE BANNER ========= */
  .daily{
    position:relative;z-index:2;
    background:linear-gradient(135deg,var(--obsidian),#5a3a8a);
    border:5px solid #111;padding:16px 20px;color:#fff;
    box-shadow:inset -3px -3px 0 #00000077,inset 3px 3px 0 #ffffff22,0 6px 0 #00000066;
    display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;
    overflow:hidden;
  }
  .daily::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(45deg,transparent 0 16px,rgba(255,255,255,.04) 16px 18px);
    pointer-events:none;
  }
  .daily-icon{
    width:64px;height:64px;background:var(--gold);
    border:4px solid #111;display:flex;align-items:center;justify-content:center;
    font-size:36px;box-shadow:inset -3px -3px 0 #00000055,inset 3px 3px 0 #ffffff44;
    filter:drop-shadow(2px 2px 0 #00000088);
    animation:bob 2.4s ease-in-out infinite alternate;
  }
  @keyframes bob{from{transform:translateY(-2px);}to{transform:translateY(2px);}}
  .daily-info{position:relative;z-index:1;}
  .daily-tag{
    display:inline-block;font-family:"Press Start 2P";font-size:9px;
    background:#ffd76b;color:#3a2a00;padding:3px 8px;border:2px solid #000;
    margin-bottom:6px;letter-spacing:.05em;
  }
  .daily-title{font-family:"DotGothic16";font-size:22px;
    text-shadow:2px 2px 0 #000;margin-bottom:4px;}
  .daily-sub{font-size:13px;text-shadow:1px 1px 0 #000;opacity:.95;}
  .daily-cta{
    font-family:"Press Start 2P";font-size:12px;
    padding:14px 18px;background:var(--gold);color:#3a2a00;border:4px solid #111;
    box-shadow:inset -3px -3px 0 #00000044,inset 3px 3px 0 #ffffff66,0 5px 0 #00000066;
    text-shadow:1px 1px 0 #ffffff88;white-space:nowrap;
    position:relative;z-index:1;
  }
  .daily-cta:hover{transform:translateY(-2px);}
  .daily-cta:active{transform:translateY(3px);
    box-shadow:inset -3px -3px 0 #00000044,inset 3px 3px 0 #ffffff66,0 2px 0 #00000066;}

  /* ========= QUEST GRID ========= */
  .section-h{
    font-family:"DotGothic16";font-size:18px;color:#fff;
    text-shadow:2px 2px 0 #000;margin:0;
    display:flex;align-items:center;gap:8px;position:relative;z-index:2;
  }
  .section-h::before{
    content:"";display:inline-block;width:6px;height:22px;background:var(--gold);
    box-shadow:1px 1px 0 #000;
  }
  .quest-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
    position:relative;z-index:2;
  }
  .quest{
    background:#fff;border:4px solid #111;padding:16px;
    box-shadow:inset -3px -3px 0 #00000022,inset 3px 3px 0 #ffffff88,0 6px 0 #00000055;
    color:#111;display:flex;flex-direction:column;gap:10px;
    position:relative;cursor:pointer;transition:transform .1s;
    text-align:left;
  }
  .quest:hover{transform:translateY(-3px);}
  .quest:active{transform:translateY(3px);
    box-shadow:inset -3px -3px 0 #00000022,inset 3px 3px 0 #ffffff88,0 2px 0 #00000055;}
  /* Object-style cards */
  body[data-cards="object"] .quest{
    background:repeating-linear-gradient(90deg,#f4e6c8 0 12px,#e8d8b0 12px 24px);
    border-color:#6b4229;border-width:5px;
  }
  body[data-cards="object"] .quest::before{
    content:"";position:absolute;top:6px;left:6px;right:6px;height:2px;
    background:#6b4229;opacity:.4;
  }
  body[data-cards="object"] .quest::after{
    content:"";position:absolute;bottom:6px;left:6px;right:6px;height:2px;
    background:#6b4229;opacity:.4;
  }

  .quest h3{font-family:"DotGothic16";font-size:22px;margin:0;}
  .qsub{font-size:13px;color:#444;}
  .qbar{height:10px;background:#ddd;border:2px solid #111;}
  .qbar .fill{
    height:100%;
    box-shadow:inset 0 -2px 0 #00000033,inset 0 2px 0 #ffffff66;
    transition:width 1.4s cubic-bezier(.4,1.4,.6,1);
  }
  .qmeta{display:flex;justify-content:space-between;
    font-family:"Press Start 2P";font-size:10px;color:#666;}
  .qhead{display:flex;align-items:center;gap:12px;}
  .icon-tile{
    width:52px;height:52px;border:3px solid #111;
    display:flex;align-items:center;justify-content:center;
    font-size:30px;box-shadow:inset -2px -2px 0 #00000055,inset 2px 2px 0 #ffffff44;
    filter:drop-shadow(2px 2px 0 #00000066);flex-shrink:0;
  }
  .quest.qmath .icon-tile{background:linear-gradient(135deg,#7cc34a,#6aab3e);}
  .quest.qprog .icon-tile{background:linear-gradient(135deg,#5ce9e6,#2a9faa);}
  .quest.qtype .icon-tile{background:linear-gradient(135deg,#b588ff,#8b5cd9);}
  .qbar.qmath .fill{background:var(--grass-top);}
  .qbar.qprog .fill{background:var(--diamond);}
  .qbar.qtype .fill{background:var(--amethyst);}

  .quest .play-cta{
    margin-top:auto;display:flex;align-items:center;justify-content:space-between;
    padding-top:6px;
  }
  .play-btn{
    font-family:"Press Start 2P";font-size:11px;
    padding:8px 12px;border:3px solid #111;
    box-shadow:inset -2px -2px 0 #00000055,inset 2px 2px 0 #ffffff66,0 3px 0 #00000055;
  }
  .quest.qmath .play-btn{background:var(--grass-top);color:#1a3a0b;text-shadow:1px 1px 0 #ffffff66;}
  .quest.qprog .play-btn{background:var(--diamond);color:#08323a;text-shadow:1px 1px 0 #ffffff66;}
  .quest.qtype .play-btn{background:var(--amethyst);color:#3a1a5e;text-shadow:1px 1px 0 #ffffff66;}
  .pts-tag{font-family:"Press Start 2P";font-size:10px;color:#666;}
  .new-flag{
    position:absolute;top:-10px;right:-10px;
    background:var(--redstone);color:#fff;font-family:"Press Start 2P";font-size:10px;
    padding:5px 8px;border:3px solid #000;transform:rotate(8deg);
    box-shadow:0 3px 0 #00000077;text-shadow:1px 1px 0 #00000099;
    animation:wobble 1.6s ease-in-out infinite alternate;
  }
  @keyframes wobble{from{transform:rotate(6deg);}to{transform:rotate(12deg);}}

  /* ========= CALENDAR ========= */
  .twocol{
    display:grid;grid-template-columns:2fr 1fr;gap:16px;
    position:relative;z-index:2;
  }
  .panel{
    background:rgba(0,0,0,.55);border:4px solid #111;padding:16px;
    box-shadow:inset -3px -3px 0 #00000077,inset 3px 3px 0 #ffffff22,0 5px 0 #00000055;
    color:#fff;display:flex;flex-direction:column;gap:10px;
  }
  .panel-h{
    font-family:"DotGothic16";font-size:18px;color:#ffd76b;
    text-shadow:2px 2px 0 #000;display:flex;align-items:center;gap:8px;
    margin:0 0 4px;
  }
  .panel-h::before{
    content:"";display:inline-block;width:5px;height:18px;background:var(--redstone);
    box-shadow:1px 1px 0 #000;
  }

  .calendar{
    display:grid;grid-template-columns:repeat(7,1fr);gap:5px;
  }
  .cal-cell{
    aspect-ratio:1;background:#444;border:2px solid #111;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    font-family:"Press Start 2P";font-size:9px;color:#999;
    box-shadow:inset -2px -2px 0 #00000077,inset 2px 2px 0 #ffffff22;
    position:relative;
  }
  .cal-cell.done{background:var(--grass-top);color:#1a3a0b;}
  .cal-cell.done::after{
    content:"✓";position:absolute;font-size:14px;color:#1a3a0b;
    font-family:"DotGothic16";
  }
  .cal-cell.today{
    background:var(--gold);color:#3a2a00;
    animation:pulse 1.2s infinite alternate;
    box-shadow:inset -2px -2px 0 #00000077,inset 2px 2px 0 #ffffff44,0 0 0 3px #ffd76b88;
  }
  @keyframes pulse{from{filter:brightness(1);}to{filter:brightness(1.25);}}

  .achievements-mini{display:flex;flex-direction:column;gap:8px;}
  .ach-row{
    display:flex;align-items:center;gap:10px;
    background:rgba(0,0,0,.4);border:2px solid #000;padding:6px 10px;
  }
  .ach-mini{
    width:28px;height:28px;border:2px solid #000;
    display:flex;align-items:center;justify-content:center;font-size:14px;
    box-shadow:inset -1px -1px 0 #00000044,inset 1px 1px 0 #ffffff44;
    flex-shrink:0;
  }
  .ach-mini.gold{background:var(--gold);color:#3a2a00;}
  .ach-mini.silver{background:#c0c0c0;color:#222;}
  .ach-mini.bronze{background:#cd7f32;color:#fff;}
  .ach-mini.locked{background:#333;color:#666;}
  .ach-row .ach-name{flex:1;font-size:13px;color:#fff;text-shadow:1px 1px 0 #000;}
  .ach-row .ach-pts{
    font-family:"Press Start 2P";font-size:9px;color:#b6ff6e;
  }
  .ach-row.locked .ach-name{color:#666;}

  /* ========= NEWS / TIPS TICKER ========= */
  .news{
    position:relative;z-index:2;
    background:#fff8c4;border:4px solid #6b4229;padding:10px 14px;
    color:#3a2a00;display:flex;align-items:center;gap:10px;
    box-shadow:inset -3px -3px 0 #6b422944,inset 3px 3px 0 #ffffffaa,0 4px 0 #6b4229aa;
    overflow:hidden;
  }
  .news-tag{
    font-family:"Press Start 2P";font-size:10px;
    background:#6b4229;color:#fff8c4;padding:5px 8px;border:2px solid #000;
    flex-shrink:0;letter-spacing:.05em;
  }
  .news-text{
    flex:1;font-size:14px;white-space:nowrap;overflow:hidden;
    mask-image:linear-gradient(90deg,transparent 0,#000 24px,#000 calc(100% - 24px),transparent 100%);
    -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 24px,#000 calc(100% - 24px),transparent 100%);
  }
  .news-text span{
    display:inline-block;padding-left:100%;
    animation:scroll 24s linear infinite;
  }
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-100%);}}

  /* ========= HOTBAR ========= */
  .hotbar-wrap{
    position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
    z-index:10;pointer-events:none;
  }
  .hotbar{
    display:flex;gap:0;background:#1a1a1a;
    border:5px solid #111;padding:4px;
    box-shadow:inset -3px -3px 0 #00000088,inset 3px 3px 0 #ffffff22,0 6px 0 #00000077;
    pointer-events:auto;
  }
  .hslot{
    width:48px;height:48px;background:#666;border:3px solid #111;
    display:flex;align-items:center;justify-content:center;font-size:24px;
    box-shadow:inset -2px -2px 0 #00000066,inset 2px 2px 0 #ffffff33;
    position:relative;cursor:pointer;color:#fff;text-shadow:1px 1px 0 #000;
    margin:0 -1.5px;
  }
  .hslot.h-math{background:linear-gradient(135deg,#7cc34a,#6aab3e);}
  .hslot.h-prog{background:linear-gradient(135deg,#5ce9e6,#2a9faa);}
  .hslot.h-type{background:linear-gradient(135deg,#b588ff,#8b5cd9);}
  .hslot.h-locked{background:#333;color:#666;}
  .hslot.h-locked .hi{filter:grayscale(.6) brightness(.5);}
  .hslot.selected{
    box-shadow:inset -2px -2px 0 #00000066,inset 2px 2px 0 #ffffff33,0 0 0 4px #fff;
    transform:scale(1.08);z-index:1;
  }
  .hslot .hnum{
    position:absolute;top:1px;left:3px;
    font-family:"Press Start 2P";font-size:7px;color:#ffd76b;
  }

  /* ========= ONEHOUDAY LOGO ========= */
  .tl{
    display:inline-flex;flex-wrap:nowrap;justify-content:center;align-items:center;gap:3px;
    font-family:"Press Start 2P",monospace;white-space:nowrap;
  }
  .tl-block{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;font-size:11px;color:#fff;
    text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;
    border:2px solid #111;flex-shrink:0;
    box-shadow:inset -1.5px -1.5px 0 #00000066,inset 1.5px 1.5px 0 #ffffff55,0 2px 0 #00000066;
  }
  .tl-g{background:var(--grass-top);}
  .tl-y{background:var(--gold);color:#3a2a00;text-shadow:1px 1px 0 #ffffff88;}
  .tl-r{background:var(--redstone);}
  .tl-d{background:var(--diamond);color:#08323a;text-shadow:1px 1px 0 #ffffff88;}
  .tl-p{background:#b588ff;}
  .tl-s{background:var(--stone);}
  .tl-e{background:#37c872;}
  .tl-o{background:#ff8a3a;}
  .tl-w{background:#fff;color:#111;text-shadow:1px 1px 0 #ffffff88;}

  /* ========= RESPONSIVE ========= */
  @media (max-width:1100px){
    .quest-grid{grid-template-columns:repeat(2,1fr);}
    .twocol{grid-template-columns:1fr;}
  }
  @media (max-width:900px){
    .app{grid-template-columns:200px 1fr;}
    .sidebar{padding:12px 8px;}
    .nav-btn{font-size:13px;padding:10px 8px;}
    .nav-btn .ico{font-size:20px;}
    .daily{grid-template-columns:auto 1fr;}
    .daily-cta{grid-column:1 / -1;justify-self:end;}
  }
  @media (max-width:720px){
    .quest-grid{grid-template-columns:1fr;}
    .v-title{font-size:24px;}
    .hotbar-wrap{display:none;}
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-mode="day" data-cards="flat" data-avatar="grass">
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "day",
  "cards": "object",
  "avatar": "grass",
  "rankLabel": "ダイヤ",
  "showHotbar": true
}/*EDITMODE-END*/;

const RANKS = ["石","鉄","金","ダイヤ","エメラルド"];
const RANK_ICONS = {"石":"🪨","鉄":"⛓","金":"🟡","ダイヤ":"💎","エメラルド":"🟢"};
const AVATARS = {grass:"🌱",dirt:"⛰",pickaxe:"⛏",heart:"❤",sword:"⚔",book:"📖"};

function ONEHOUDAYLogo(){
  const cells = [
    ['O','tl-g'],['N','tl-y'],['E','tl-r'],
    ['H','tl-d'],['O','tl-p'],['U','tl-s'],
    ['D','tl-e'],['A','tl-o'],['Y','tl-w']
  ];
  return (
    <div className="tl" aria-label="ONEHOUDAY">
      {cells.map(([c,cls],i) => <span key={i} className={`tl-block ${cls}`}>{c}</span>)}
    </div>
  );
}

function Clouds(){
  // randomized cloud positions
  const clouds = React.useMemo(() => [
    {top:18,delay:0,duration:55},
    {top:60,delay:8,duration:75},
    {top:110,delay:18,duration:65},
    {top:34,delay:30,duration:90},
  ], []);
  return (
    <div className="sky-layer clouds">
      {clouds.map((c,i) => (
        <div key={i} className="cloud"
             style={{top:c.top,animationDelay:`-${c.delay}s`,animationDuration:`${c.duration}s`}} />
      ))}
    </div>
  );
}

function TopBar({rank,points,onShake}){
  return (
    <div className="topbar">
      <button className="home-btn">🏠 ホーム</button>
      <div className="breadcrumb"><b>ホーム</b> ／ きょうの ぼうけん</div>
      <div className="topbar-actions">
        <button className="icon-btn" title="お知らせ">
          📜<span className="dot">2</span>
        </button>
        <button className="icon-btn" title="サウンド" onClick={onShake}>🔊</button>
        <div className="rank-badge">
          <span>{RANK_ICONS[rank] || "🪨"}</span>
          <span className="rb-name">{rank}</span>
          <span>{points.toLocaleString()}</span>
          <span className="rb-p">P</span>
        </div>
      </div>
    </div>
  );
}

function Sidebar({avatar,rank}){
  return (
    <aside className="sidebar">
      <div className="sidebar-logo"><ONEHOUDAYLogo /></div>
      <button className="nav-btn active">
        <span className="ico">🏠</span><span className="label">ホーム</span>
      </button>
      <button className="nav-btn">
        <span className="ico">🧮</span><span className="label">さんすう</span>
        <span className="badge">7/12</span>
      </button>
      <button className="nav-btn">
        <span className="ico">🤖</span><span className="label">プログラミング</span>
        <span className="badge">3/5</span>
      </button>
      <button className="nav-btn">
        <span className="ico">⌨</span><span className="label">タイピング</span>
        <span className="badge">NEW</span>
      </button>
      <button className="nav-btn">
        <span className="ico">🏆</span><span className="label">じっせき</span>
      </button>

      <div className="player">
        <div className="player-row">
          <div className="avatar">{AVATARS[avatar] || "🌱"}</div>
          <div>
            <div className="player-name">RANK · {rank}</div>
            <div className="player-rank">つぎは {nextRank(rank)} まで</div>
          </div>
        </div>
        <div className="xpbar"><div className="fill" style={{width:'62%'}}></div></div>
        <div className="xptxt">1,850 / 2,000 P</div>
      </div>
    </aside>
  );
}

function nextRank(rank){
  const i = RANKS.indexOf(rank);
  return i >= 0 && i < RANKS.length - 1 ? RANKS[i+1] : "MAX";
}

function DailyChallenge(){
  return (
    <div className="daily">
      <div className="daily-icon">⭐</div>
      <div className="daily-info">
        <span className="daily-tag">DAILY CHALLENGE</span>
        <div className="daily-title">きょうの ちょうせん：九九 6の段</div>
        <div className="daily-sub">9問 ぜんぶ せいかいで <b style={{color:'#ffd76b'}}>+500P</b> ボーナス！</div>
      </div>
      <button className="daily-cta">▶ ちょうせん！</button>
    </div>
  );
}

function QuestGrid(){
  const quests = [
    {key:'qmath',ico:'🧮',title:'さんすう',sub:'九九 5の段 まで クリア',
     fill:58,meta:['7 / 12 STAGE','★ 6,400P'],pts:'ベスト 1,950P',cta:'▶ つづける'},
    {key:'qprog',ico:'🤖',title:'プログラミング',sub:'つぎ：ジグザグ ミッション',
     fill:60,meta:['3 / 5 MISSION','★ 2,400P'],pts:'ロボットを うごかそう',cta:'▶ つづける'},
    {key:'qtype',ico:'⌨',title:'タイピング',sub:'君が代 はじめて 挑戦！',
     fill:15,meta:['NEW','★ 0P'],pts:'キーボードで バトル',cta:'▶ はじめる',isNew:true}
  ];
  return (
    <div className="quest-grid">
      {quests.map(q => (
        <button key={q.key} className={`quest ${q.key}`}>
          {q.isNew && <div className="new-flag">NEW!</div>}
          <div className="qhead">
            <div className="icon-tile">{q.ico}</div>
            <div>
              <h3>{q.title}</h3>
              <div className="qsub">{q.sub}</div>
            </div>
          </div>
          <div className={`qbar ${q.key}`}><div className="fill" style={{width:`${q.fill}%`}}></div></div>
          <div className="qmeta">{q.meta.map((m,i)=><span key={i}>{m}</span>)}</div>
          <div className="play-cta">
            <span className="pts-tag">{q.pts}</span>
            <span className="play-btn">{q.cta}</span>
          </div>
        </button>
      ))}
    </div>
  );
}

function CalendarPanel(){
  const days = ['月','火','水','木','金','土','日'];
  const status = ['done','done','done','done','done','today',''];
  const labels = ['1','2','3','4','5','6','7'];
  return (
    <div className="panel">
      <h3 className="panel-h">📅 れんぞく プレイ</h3>
      <div className="calendar">
        {days.map((d,i)=>(
          <div key={i} className={`cal-cell ${status[i]}`}>
            <div style={{fontSize:8,opacity:.7,marginBottom:2}}>{d}</div>
            <div>{labels[i]}</div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center',fontFamily:"'Press Start 2P'",fontSize:10,
                   color:'#ffd76b',marginTop:4,textShadow:'1px 1px 0 #000'}}>
        🔥 5日 れんぞく！ あと 2日で +1,000P
      </div>
    </div>
  );
}

function AchievementsPanel(){
  const items = [
    {tier:'gold',ico:'⭐',name:'九九 1の段 PERFECT',pts:'+500P'},
    {tier:'silver',ico:'🥈',name:'ミッション 3 クリア',pts:'+300P'},
    {tier:'bronze',ico:'🥉',name:'れんぞく 5日',pts:'+200P'},
    {tier:'locked',ico:'🔒',name:'？？？',pts:'---',locked:true},
  ];
  return (
    <div className="panel">
      <h3 className="panel-h">🏆 さいきんの じっせき</h3>
      <div className="achievements-mini">
        {items.map((it,i)=>(
          <div key={i} className={`ach-row ${it.locked?'locked':''}`}>
            <div className={`ach-mini ${it.tier}`}>{it.ico}</div>
            <div className="ach-name">{it.name}</div>
            <div className="ach-pts">{it.pts}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function NewsTicker(){
  return (
    <div className="news">
      <span className="news-tag">📢 NEWS</span>
      <div className="news-text">
        <span>
          🆕 タイピング「君が代モード」リリース！　•　
          🎮 6/1 から「九九マスター キャンペーン」スタート　•　
          🏆 今週のランキング1位は ダイヤ！おめでとう！　•　
          🔧 メンテナンス予定なし　•　
          ⭐ デイリーチャレンジ ぜんぶ クリアで バッジゲット！
        </span>
      </div>
    </div>
  );
}

function Hotbar({selected,setSelected}){
  const slots = [
    {ico:'🧮',cls:'h-math',num:1},
    {ico:'🤖',cls:'h-prog',num:2},
    {ico:'⌨',cls:'h-type',num:3},
    {ico:'🔬',cls:'h-locked',num:4},
    {ico:'🗺',cls:'h-locked',num:5},
    {ico:'🎨',cls:'h-locked',num:6},
    {ico:'🎵',cls:'h-locked',num:7},
    {ico:'📖',cls:'h-locked',num:8},
    {ico:'❓',cls:'h-locked',num:9},
  ];
  React.useEffect(()=>{
    const h = (e) => {
      const n = parseInt(e.key);
      if (n >= 1 && n <= 9) setSelected(n);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  },[setSelected]);
  return (
    <div className="hotbar-wrap">
      <div className="hotbar">
        {slots.map((s)=>(
          <div key={s.num}
               className={`hslot ${s.cls} ${selected===s.num?'selected':''}`}
               onClick={()=>setSelected(s.num)}>
            <span className="hnum">{s.num}</span>
            <span className="hi">{s.ico}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [selected, setSelected] = React.useState(1);

  React.useEffect(()=>{
    document.body.dataset.mode = t.mode;
    document.body.dataset.cards = t.cards;
    document.body.dataset.avatar = t.avatar;
  }, [t.mode, t.cards, t.avatar]);

  const isNight = t.mode === 'night';

  return (
    <>
      <TopBar rank={t.rankLabel} points={1850} />
      <div className="app">
        <Sidebar avatar={t.avatar} rank={t.rankLabel} />
        <main className="content">
          {isNight ? <div className="moon"></div> : <div className="sun"></div>}
          <div className="stars"></div>
          <Clouds />

          <div className="ttl-row">
            <div>
              <div className="greet">
                {isNight ? '🌙 こんやも ぼうけん！' : '🌳 きょうも ぼうけん スタート！'}
              </div>
              <h1 className="v-title">きょうの ぼうけんは？</h1>
            </div>
            <div className="header-pills">
              <div className="streak">🔥 5日 れんぞく プレイ！</div>
              <div className="daily-pill">⭐ デイリー +500P</div>
            </div>
          </div>

          <DailyChallenge />

          <h3 className="section-h">📚 ぼうけんを えらぼう</h3>
          <QuestGrid />

          <NewsTicker />

          <div className="twocol">
            <CalendarPanel />
            <AchievementsPanel />
          </div>

          <div className="ground">
            <div className="grass"></div>
            <div className="dirt"></div>
          </div>
        </main>
      </div>

      {t.showHotbar && <Hotbar selected={selected} setSelected={setSelected} />}

      <TweaksPanel>
        <TweakSection label="ビジュアル" />
        <TweakRadio label="昼/夜" value={t.mode} options={['day','night']}
                    labels={['☀ 昼','🌙 夜']}
                    onChange={(v)=>setTweak('mode', v)} />
        <TweakRadio label="カードの見た目" value={t.cards}
                    options={['flat','object']}
                    labels={['フラット','巻物風']}
                    onChange={(v)=>setTweak('cards', v)} />

        <TweakSection label="プレイヤー" />
        <TweakSelect label="アバター" value={t.avatar}
                     options={['grass','dirt','pickaxe','heart','sword','book']}
                     labels={['🌱 草','⛰ 土','⛏ ピッケル','❤ ハート','⚔ 剣','📖 本']}
                     onChange={(v)=>setTweak('avatar', v)} />
        <TweakSelect label="ランクの呼び方" value={t.rankLabel}
                     options={RANKS}
                     onChange={(v)=>setTweak('rankLabel', v)} />

        <TweakSection label="UI" />
        <TweakToggle label="ホットバーを表示" value={t.showHotbar}
                     onChange={(v)=>setTweak('showHotbar', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
